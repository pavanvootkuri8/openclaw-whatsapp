<!DOCTYPE html>
<html>
<head>
  <title>OpenClaw Jobs</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 8px; border: 1px solid #ddd; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>
  <h1>OpenClaw Jobs</h1>
  <table>
    <tr>
      <th>Title</th>
      <th>Company</th>
      <th>Location</th>
      <th>Link</th>
    </tr>
    {% for job in jobs %}
    <tr>
      <td>{{ job.title }}</td>
      <td>{{ job.company }}</td>
      <td>{{ job.location }}</td>
      <td><a href="{{ job.url }}" target="_blank">Link</a></td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
